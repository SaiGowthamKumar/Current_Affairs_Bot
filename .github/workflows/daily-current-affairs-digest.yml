name: Daily Current Affairs Digest

on:
  schedule:
    # 06:00 AM IST = 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore sent article history
        uses: actions/cache@v4
        with:
          path: sent_articles.json
          key: sent-articles-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            sent-articles-${{ runner.os }}-

      - name: Ensure sent article tracker exists
        run: |
          if [ ! -f sent_articles.json ]; then
            echo "{}" > sent_articles.json
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run current affairs agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SEND_TIME: "06:00"
          SOURCE_TIME_BUDGET_SECONDS: ${{ secrets.SOURCE_TIME_BUDGET_SECONDS }}
          REQUEST_RETRY_ATTEMPTS: ${{ secrets.REQUEST_RETRY_ATTEMPTS }}
          REQUEST_RETRY_BACKOFF_SECONDS: ${{ secrets.REQUEST_RETRY_BACKOFF_SECONDS }}
          RSS_MAX_ENTRIES_PER_SOURCE: ${{ secrets.RSS_MAX_ENTRIES_PER_SOURCE }}
          RSS_FULL_ARTICLE_FETCH_LIMIT: ${{ secrets.RSS_FULL_ARTICLE_FETCH_LIMIT }}
          HTML_MAX_ARTICLES_PER_SOURCE: ${{ secrets.HTML_MAX_ARTICLES_PER_SOURCE }}
        run: python main.py --test
